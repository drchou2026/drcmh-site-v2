description: >-
  💧 咳嗽、打噴嚏就漏尿？

  其實很多人都有「尿失禁」問題，只是不好意思開口。

  這支影片是周孟翰醫師過去受台灣尿失禁學會邀請時，所進行的一場臉書直播內容。雖然直播形式比較樸素，沒有華麗剪輯，但內容相當完整，從尿失禁的常見原因、分類、診斷方式，到保守治療、藥物治療與進一步處置，都有仔細說明。

